[DomainMapper]
# ──────────────────────────────────────────────
# MyDomainMapper — конфигурационный файл
# ──────────────────────────────────────────────

# Сервисы для разрешения (через запятую)
# пусто     = интерактивный выбор
# all       = все сервисы
# Примеры:  telegram,discord,youtube
#           ChatGPT,Claude,Gemini
service =

# DNS серверы (номера через пробел, 0 = все)
# 1=Системный  2=Google  3=Quad9  4=Cloudflare
# 5=OpenDNS   6=AdGuard  7=DNS.Watch  8=CleanBrowsing
# 9=Alternate  10=ControlD  11=Yandex
dnsserver =

# Исключить IP Cloudflare: yes / no / пусто (спросить)
cloudflare =

# Агрегация подсетей: 16 / 24 / mix / пусто (спросить)
subnet =

# Имя выходного файла
filename = resolved-ips.txt

# Потоков запросов к одному DNS серверу
threads = 20

# Формат вывода: ip / cidr / win / unix / keenetic / mikrotik / ovpn / wireguard
filetype =

# Шлюз для win/unix форматов
gateway =

# Шлюз для keenetic формата
keenetic =

# Имя списка для Mikrotik firewall
listname =

# Показывать инфо о конфигурации при старте
cfginfo = yes

# Команда для выполнения после завершения (опционально)
run =
