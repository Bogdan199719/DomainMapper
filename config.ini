[DomainMapper]

# Оставьте пустым для пошагового режима.
# Примеры: telegram,discord или all
service =

# DNS через пробел:
# 1 = системный, 2 = Google, 3 = Quad9, 4 = Cloudflare
# Пусто = программа спросит или выберет сама в batch-режиме
dnsserver =

# yes = убрать IP Cloudflare, no = оставить, пусто = спросить
cloudflare =

# Качество итогового списка:
# live = только то, что найдено сейчас
# smart = проверенные IP + новые (рекомендуется)
# stable = только проверенные IP из истории
quality =

# 16 / 24 / mix / пусто
subnet =

# Если оставить как есть, имя файла будет сгенерировано автоматически
filename = resolved-ips.txt

# Формат: ip / cidr / win / unix / keenetic / mikrotik / ovpn / wireguard
filetype =

# Для win / unix
gateway =

# Для keenetic
keenetic =

# Для mikrotik
listname =

# Количество параллельных запросов к одному DNS
threads = 20

# Показывать краткую информацию о конфиге при старте
cfginfo = yes

# yes = подробный лог по каждому домену
verbose = no

# Необязательно: команда после завершения
run =
